<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment - 01 | DevConf2026</title>

    <!-- Favicon Icon -->
    <link
      rel="shortcut icon"
      href="./assets/images/logo-mini.png"
      type="image/x-icon"
    />

    <!-- Font - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet -->
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body>
    <!-- Header Section -->
    <header class="header">
      <nav class="nav container">
        <a href="#" class="nav__logo"
          ><img src="./assets/images/logo.png" alt="DEVCONF 2026 logo"
        /></a>

        <ul class="nav__list">
          <li><a href="#speakers" class="nav__link">Speakers</a></li>
          <li><a href="#schedule" class="nav__link">Schedule</a></li>
          <li><a href="#tracks" class="nav__link">Tracks</a></li>
          <li><a href="#venue" class="nav__link">Venue</a></li>
          <li><a href="#blog" class="nav__link">Blog</a></li>
        </ul>

        <a href="#" class="nav__cta btn">Register Now</a>
      </nav>
    </header>

    <main class="main">
      <!-- Banner Section -->
      <section class="banner section">
        <div class="section__container container">
          <h1 class="banner__title">Code. <em>Connect.</em> Create</h1>
          <p class="banner__desc">
            Join 4,000+ engineers, founders, and builders at the premier
            developer conference of 2026. Three days of cutting-edge talks,
            hands-on workshops, and meaningful connections.
          </p>

          <a href="#" class="banner__cta btn">Register Now</a>
        </div>
      </section>

      <!-- Speakers Section -->
      <section class="speakers section"></section>

      <!-- Price Section -->
      <section class="price section"></section>
    </main>

    <!-- Footer Section -->
    <footer class="footer"></footer>
  </body>
</html>
